name: Publish VS Code Extension

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate VSCE_PAT secret
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Missing required repository secret VSCE_PAT. Add a valid Marketplace PAT and retry."
            exit 1
          fi

      - name: Verify publisher PAT permissions
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          PUBLISHER=$(node -p "require('./package.json').publisher")
          set +e
          npx @vscode/vsce verify-pat "$PUBLISHER" 2>&1 | tee verify-pat.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            if grep -Ei "TF400813|Unauthorized|401|403|Invalid Resource|expired" verify-pat.log >/dev/null; then
              echo "::error::Marketplace authentication failed. Check VSCE_PAT is valid/current, has Marketplace Manage scope, is scoped to all accessible organizations when required, and that token owner has publisher access for '$PUBLISHER'."
            fi
            exit "$status"
          fi

      - name: Build extension
        run: npm run build

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          npx @vscode/vsce publish --skip-duplicate 2>&1 | tee publish.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            if grep -Ei "TF400813|Unauthorized|401|403|Invalid Resource|expired" publish.log >/dev/null; then
              echo "::error::Marketplace publish authentication failed. Rotate VSCE_PAT if needed, ensure Marketplace Manage scope, all-organizations scope when required, and publisher access in package.json publisher."
            fi
            exit "$status"
          fi
